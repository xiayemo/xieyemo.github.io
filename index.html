<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>实验六 基于ArcGIS API for JavaScript构建WebGIS应用</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/css/main.css">
  <script src="https://js.arcgis.com/4.28/"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;}

    /* 顶部页眉 */
    .header{
      width: 100%;
      height: 60px;
      background: #162944;
      color: #fff;
      line-height: 60px;
      padding-left: 30px;
      font-size: 21px;
      font-weight: bold;
    }

    /* 主体布局 */
    .main-container{
      width: 100%;
      height: calc(100vh - 60px);
      display: flex;
    }

    /* 地图区域 */
    #viewDiv{
      flex: 1;
      height: 100%;
    }

    /* 右侧底图切换栏 */
    .basemap-list{
      width: 240px;
      height: 100%;
      background: #f0f2f5;
      padding: 20px;
    }
    .basemap-list h3{
      margin-bottom: 15px;
      color: #162944;
      border-bottom: 2px solid #ccc;
      padding-bottom: 8px;
    }
    .basemap-btn{
      width: 100%;
      padding: 12px 0;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      font-size: 15px;
    }
    .basemap-btn:hover{
      background: #3676d8;
      color: white;
    }
  </style>
</head>
<body>

  <div class="header">基于ArcGIS API for JavaScript WebGIS实验</div>

  <div class="main-container">
    <div id="viewDiv"></div>
    <div class="basemap-list">
      <h3>底图切换</h3>
      <button class="basemap-btn" onclick="setBasemap('streets-vector')">矢量街道</button>
      <button class="basemap-btn" onclick="setBasemap('satellite')">卫星影像</button>
      <button class="basemap-btn" onclick="setBasemap('terrain')">地形底图</button>
    </div>
  </div>

<script>
var map, view;

require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/widgets/ScaleBar",
  "esri/widgets/Legend",
  "esri/widgets/LayerList"
], function(Map, MapView, FeatureLayer, ScaleBar, Legend, LayerList) {

  // ArcGIS 4.28 官方原生标准底图，无需登录、国内可正常加载
  map = new Map({
    basemap: "streets-vector"
  });

  // 全球公开国界要素图层，匿名无权限限制
  var chinaLayer = new FeatureLayer({
    url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/World_Countries/FeatureServer/0"
  });
  map.add(chinaLayer);

  view = new MapView({
    container: "viewDiv",
    map: map,
    center: [105, 35],
    zoom: 4
  });

  // 只保留作业必选控件，彻底删除需要登录的搜索Search控件
  view.ui.add(new ScaleBar({ view: view, unit: "metric" }), "bottom-left");
  view.ui.add(new Legend({ view: view }), "bottom-right");
  view.ui.add(new LayerList({ view: view }), "top-left");

  // 严格匹配4.28官方底图ID，零报错切换
  window.setBasemap = function (type) {
    map.basemap = type;
  };

});
</script>
</body>
</html>
